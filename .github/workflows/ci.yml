name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build -c release --product Sash

      - name: Run tests
        run: swift run SashTests

      - name: Coverage report (SashKit)
        run: ./scripts/coverage.sh
